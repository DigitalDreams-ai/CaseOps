<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseOps Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/caseops.css') }}">
    <style>
        body {
            background: var(--color-bg);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            padding: 20px;
        }
        #settings-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .settings-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
        }
        .settings-header img {
            width: 32px;
            height: 32px;
        }
        .settings-header h1 {
            margin: 0;
            font-size: 24px;
        }
        .settings-header a {
            margin-left: auto;
            padding: 6px 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-text);
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .settings-header a:hover {
            background: var(--color-border);
        }
        .settings-section {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .settings-section h2 {
            margin: 0 0 15px 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--color-primary);
        }
        .settings-field {
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 10px;
            align-items: center;
        }
        .settings-field label {
            font-weight: 500;
            color: var(--color-text);
        }
        .settings-field input,
        .settings-field select {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            color: var(--color-text);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-family: monospace;
        }
        .settings-field input:focus,
        .settings-field select:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        .settings-field input[type="password"] {
            letter-spacing: 2px;
        }
        .test-button {
            padding: 6px 12px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        .test-button:hover {
            background: var(--color-primary-hover, #1f6feb);
            filter: brightness(1.1);
        }
        .test-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .test-result {
            display: inline-block;
            margin-left: 10px;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
        }
        .test-result.success {
            background: var(--color-success);
            color: white;
        }
        .test-result.error {
            background: var(--color-danger);
            color: white;
        }
        .test-result.pending {
            background: var(--color-warn);
            color: white;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 5px;
        }
        .status-badge.ok {
            background: var(--color-success);
            color: white;
        }
        .status-badge.not-ok {
            background: var(--color-danger);
            color: white;
        }
        .status-note {
            font-size: 12px;
            color: var(--color-text);
            margin-top: 5px;
            font-style: italic;
        }
        .org-status {
            margin-bottom: 10px;
        }
        .org-status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .org-alias {
            font-family: monospace;
            font-weight: 500;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .button-primary {
            padding: 8px 16px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .button-primary:hover {
            filter: brightness(1.1);
        }
        .button-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .banner {
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .banner.success {
            background: var(--color-success);
            color: white;
        }
        .banner.error {
            background: var(--color-danger);
            color: white;
        }
        .lvm-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .lvm-option input[type="radio"] {
            margin: 0;
        }
        .section-collapsed {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s;
        }
        .section-collapsed.expanded {
            max-height: 1000px;
        }
        .collapsible-header {
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 8px;
            margin-bottom: 15px;
        }
        .collapsible-toggle {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 1px solid var(--color-border);
            border-radius: 2px;
            text-align: center;
            line-height: 14px;
            font-size: 12px;
            user-select: none;
        }
        .auth-method-block {
            margin: 15px 0;
            padding: 10px;
            background: var(--color-bg);
            border-left: 3px solid var(--color-primary);
            border-radius: 4px;
        }
        .auth-method-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--color-primary);
        }
        .auth-command-group {
            margin-bottom: 12px;
        }
        .auth-command-label {
            font-size: 12px;
            color: var(--color-text);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .auth-command-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .auth-command-box code {
            flex: 1;
            background: var(--color-surface);
            padding: 8px;
            border: 1px solid var(--color-border);
            border-radius: 3px;
            font-size: 12px;
            overflow-x: auto;
            white-space: nowrap;
            font-family: monospace;
        }
        .copy-button {
            padding: 4px 8px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .copy-button:hover {
            filter: brightness(1.1);
        }
        .copy-button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="settings-container">
        <div class="settings-header">
            <img src="{{ url_for('static', filename='logo.svg') }}" alt="Logo">
            <h1>Settings</h1>
            <a href="/">← Back to CaseOps</a>
        </div>

        <div id="banner"></div>

        <form id="settings-form">
            <!-- LLM Mode -->
            <div class="settings-section">
                <h2>LLM Mode</h2>
                <div class="settings-field">
                    <label>Authentication:</label>
                    <div>
                        <div class="lvm-option">
                            <input type="radio" id="lvm-api" name="CASEOPS_LLM_AUTH" value="api_key">
                            <label for="lvm-api">Anthropic API Key (pay-per-use)</label>
                        </div>
                        <div class="lvm-option">
                            <input type="radio" id="lvm-claude" name="CASEOPS_LLM_AUTH" value="claude_code">
                            <label for="lvm-claude">Claude Code CLI (subscription)</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Jira -->
            <div class="settings-section">
                <h2>Jira</h2>
                <div class="settings-field">
                    <label for="jira-base-url">Base URL:</label>
                    <input type="url" id="jira-base-url" name="JIRA_BASE_URL" placeholder="https://org.atlassian.net" autocomplete="off">
                </div>
                <div class="settings-field">
                    <label for="jira-email">Email:</label>
                    <input type="email" id="jira-email" name="JIRA_EMAIL" placeholder="user@example.com" autocomplete="off">
                </div>
                <div class="settings-field">
                    <label for="jira-token">API Token:</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="password" id="jira-token" name="JIRA_API_TOKEN" placeholder="••••••••" autocomplete="off">
                        <button type="button" class="test-button" id="test-jira">Test Connection</button>
                        <span id="jira-test-result" class="test-result"></span>
                    </div>
                </div>
            </div>

            <!-- Anthropic API -->
            <div class="settings-section">
                <h2>Anthropic API</h2>
                <div class="settings-field">
                    <label for="anthropic-key">API Key:</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="password" id="anthropic-key" name="ANTHROPIC_API_KEY" placeholder="sk-••••••••" autocomplete="off">
                        <button type="button" class="test-button" id="test-anthropic">Test API</button>
                        <span id="anthropic-test-result" class="test-result"></span>
                    </div>
                </div>
                <div class="settings-field">
                    <label for="anthropic-model">Model:</label>
                    <input type="text" id="anthropic-model" name="CASEOPS_ANTHROPIC_MODEL" placeholder="claude-sonnet-4-6">
                </div>
            </div>

            <!-- Claude Code CLI -->
            <div class="settings-section">
                <h2>Claude Code CLI</h2>
                <div id="claude-status">Loading...</div>
                <div class="status-note">
                    To authenticate Claude Code CLI: SSH to your NAS and run <code>claude login</code>
                </div>
            </div>

            <!-- Salesforce -->
            <div class="settings-section">
                <h2>Salesforce</h2>
                <div class="settings-field">
                    <label for="use-cci-auth">Org Auth Method:</label>
                    <div>
                        <div class="lvm-option">
                            <input type="radio" id="use-sf-auth" name="CASEOPS_USE_CCI_FOR_AUTH" value="false">
                            <label for="use-sf-auth">Salesforce CLI (sf)</label>
                        </div>
                        <div class="lvm-option">
                            <input type="radio" id="use-cci-auth" name="CASEOPS_USE_CCI_FOR_AUTH" value="true">
                            <label for="use-cci-auth">CumulusCI (cci)</label>
                        </div>
                    </div>
                </div>

                <div class="settings-field">
                    <label for="sf-prod-alias">Production alias:</label>
                    <input type="text" id="sf-prod-alias" name="CASEOPS_PRODUCTION_READ_ORG" placeholder="prod">
                </div>
                <div id="sf-prod-status" style="margin-left: 150px; margin-bottom: 15px;"></div>

                <div class="settings-field">
                    <label for="sf-sand-alias">Sandbox alias:</label>
                    <input type="text" id="sf-sand-alias" name="CASEOPS_SANDBOX_TARGET_ORG" placeholder="sandbox">
                </div>
                <div id="sf-sand-status" style="margin-left: 150px; margin-bottom: 15px;"></div>

                <div class="status-note" id="auth-instructions">
                    <!-- Instructions dynamically shown based on selected method -->
                </div>
            </div>

            <!-- Advanced (collapsed) -->
            <div class="settings-section">
                <div class="collapsible-header" onclick="toggleAdvanced()">
                    <span class="collapsible-toggle" id="advanced-toggle">+</span>
                    <h2 style="display: inline; margin: 0;">Advanced</h2>
                </div>
                <div id="advanced-content" class="section-collapsed">
                    <div class="settings-field">
                        <label for="azure-org">Azure DevOps Org:</label>
                        <input type="text" id="azure-org" name="AZURE_DEVOPS_ORG" placeholder="myorg">
                    </div>
                    <div class="settings-field">
                        <label for="azure-project">Azure DevOps Project:</label>
                        <input type="text" id="azure-project" name="AZURE_DEVOPS_PROJECT" placeholder="myproject">
                    </div>
                    <div class="settings-field">
                        <label for="azure-pat">Azure DevOps PAT:</label>
                        <input type="password" id="azure-pat" name="AZURE_DEVOPS_PAT" placeholder="••••••••" autocomplete="off">
                    </div>
                    <div class="settings-field">
                        <label for="prod-magic-link">Production Magic Link:</label>
                        <input type="text" id="prod-magic-link" name="CASEOPS_PRODUCTION_MAGIC_LINK" placeholder="https://...">
                    </div>
                    <div class="settings-field">
                        <label for="sand-magic-link">Sandbox Magic Link:</label>
                        <input type="text" id="sand-magic-link" name="CASEOPS_SANDBOX_MAGIC_LINK" placeholder="https://...">
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="button-primary" id="save-button">Save Settings</button>
                <button type="button" class="button-primary" onclick="location.reload()">Reload Page</button>
            </div>
        </form>
    </div>

    <script>
        let advancedExpanded = false;

        function toggleAdvanced() {
            advancedExpanded = !advancedExpanded;
            const content = document.getElementById('advanced-content');
            const toggle = document.getElementById('advanced-toggle');
            if (advancedExpanded) {
                content.classList.add('expanded');
                toggle.textContent = '−';
            } else {
                content.classList.remove('expanded');
                toggle.textContent = '+';
            }
        }

        function showBanner(message, type) {
            const banner = document.getElementById('banner');
            banner.textContent = message;
            banner.className = `banner ${type}`;
            banner.style.display = 'block';
            setTimeout(() => {
                banner.style.display = 'none';
            }, 5000);
        }

        async function loadSettings() {
            try {
                const resp = await fetch('/api/settings');
                if (!resp.ok) return;
                const data = await resp.json();

                for (const [key, value] of Object.entries(data)) {
                    const elem = document.querySelector(`[name="${key}"]`);
                    if (!elem) continue;

                    if (elem.type === 'radio') {
                        document.querySelector(`[name="${key}"][value="${value}"]`).checked = true;
                    } else {
                        elem.value = value || '';
                    }
                }

                // Update instructions after form is populated
                updateAuthInstructions();
            } catch (e) {
                console.error('Failed to load settings:', e);
            }
        }

        async function loadStatus() {
            try {
                const resp = await fetch('/api/settings/status');
                if (!resp.ok) return;
                const status = await resp.json();

                // Claude status
                const claudeDiv = document.getElementById('claude-status');
                if (status.claude.installed) {
                    claudeDiv.innerHTML = `<span class="status-badge ok">✓ Installed & functional</span> ${status.claude.version || ''}`;
                } else {
                    claudeDiv.innerHTML = `<span class="status-badge not-ok">✗ Not installed</span>`;
                }

                // Determine which auth method to show
                const useCCI = document.querySelector('input[name="CASEOPS_USE_CCI_FOR_AUTH"]:checked');
                const isCCIMode = useCCI && useCCI.value === 'true';

                // Salesforce prod
                const prodDiv = document.getElementById('sf-prod-status');
                let prodStatus;
                if (isCCIMode && status.cci_installed) {
                    prodStatus = status.cci_prod.authenticated
                        ? `<span class="status-badge ok">✓ authenticated (cci)</span>`
                        : `<span class="status-badge not-ok">✗ not authenticated (cci)</span>`;
                } else if (status.sf_installed) {
                    prodStatus = status.sf_prod.authenticated
                        ? `<span class="status-badge ok">✓ authenticated (sf)</span> ${status.sf_prod.username || ''}`
                        : `<span class="status-badge not-ok">✗ not authenticated (sf)</span>`;
                } else {
                    prodStatus = `<span class="status-badge not-ok">✗ CLI not installed</span>`;
                }
                prodDiv.innerHTML = prodStatus;

                // Salesforce sandbox
                const sandDiv = document.getElementById('sf-sand-status');
                let sandStatus;
                if (isCCIMode && status.cci_installed) {
                    sandStatus = status.cci_sandbox.authenticated
                        ? `<span class="status-badge ok">✓ authenticated (cci)</span>`
                        : `<span class="status-badge not-ok">✗ not authenticated (cci)</span>`;
                } else if (status.sf_installed) {
                    sandStatus = status.sf_sandbox.authenticated
                        ? `<span class="status-badge ok">✓ authenticated (sf)</span> ${status.sf_sandbox.username || ''}`
                        : `<span class="status-badge not-ok">✗ not authenticated (sf)</span>`;
                } else {
                    sandStatus = `<span class="status-badge not-ok">✗ CLI not installed</span>`;
                }
                sandDiv.innerHTML = sandStatus;
            } catch (e) {
                console.error('Failed to load status:', e);
            }
        }

        async function testJira() {
            const baseUrl = document.getElementById('jira-base-url').value;
            const email = document.getElementById('jira-email').value;
            const token = document.getElementById('jira-token').value;

            const result = document.getElementById('jira-test-result');
            const btn = document.getElementById('test-jira');
            btn.disabled = true;
            result.textContent = '...';
            result.className = 'test-result pending';

            try {
                const resp = await fetch('/api/settings/test-jira', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ JIRA_BASE_URL: baseUrl, JIRA_EMAIL: email, JIRA_API_TOKEN: token }),
                });

                if (resp.ok) {
                    result.textContent = '✓ Connected';
                    result.className = 'test-result success';
                } else {
                    const data = await resp.json();
                    result.textContent = '✗ ' + (data.error || 'Error');
                    result.className = 'test-result error';
                }
            } catch (e) {
                result.textContent = '✗ ' + e.message;
                result.className = 'test-result error';
            } finally {
                btn.disabled = false;
            }
        }

        async function testAnthropicAPI() {
            const apiKey = document.getElementById('anthropic-key').value;

            const result = document.getElementById('anthropic-test-result');
            const btn = document.getElementById('test-anthropic');
            btn.disabled = true;
            result.textContent = '...';
            result.className = 'test-result pending';

            try {
                const resp = await fetch('/api/settings/test-anthropic', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ANTHROPIC_API_KEY: apiKey }),
                });

                if (resp.ok) {
                    result.textContent = '✓ Valid';
                    result.className = 'test-result success';
                } else {
                    const data = await resp.json();
                    result.textContent = '✗ ' + (data.error || 'Error');
                    result.className = 'test-result error';
                }
            } catch (e) {
                result.textContent = '✗ ' + e.message;
                result.className = 'test-result error';
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = document.getElementById('settings-form');
            const formData = new FormData(form);
            const data = {};

            for (const [key, value] of formData.entries()) {
                data[key] = String(value).trim();
            }

            const btn = document.getElementById('save-button');
            btn.disabled = true;

            try {
                const resp = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });

                if (resp.ok) {
                    showBanner('Settings saved successfully', 'success');
                    await loadSettings();
                    await loadStatus();
                } else {
                    const error = await resp.json();
                    showBanner('Error saving settings: ' + (error.error || 'Unknown error'), 'error');
                }
            } catch (e) {
                showBanner('Error: ' + String(e), 'error');
            } finally {
                btn.disabled = false;
            }
        });

        function updateAuthInstructions() {
            const useCCI = document.querySelector('input[name="CASEOPS_USE_CCI_FOR_AUTH"]:checked')?.value === 'true';
            const prodAlias = document.getElementById('sf-prod-alias').value || '<prod-alias>';
            const sandAlias = document.getElementById('sf-sand-alias').value || '<sandbox-alias>';
            const instrDiv = document.getElementById('auth-instructions');

            let html = '';

            if (useCCI) {
                html = `
                    <div class="auth-method-block">
                        <div class="auth-method-title">Using CumulusCI (cci)</div>

                        <div class="auth-command-group">
                            <div class="auth-command-label">Production:</div>
                            <div class="auth-command-box">
                                <code id="cci-prod-cmd">cci org connect ${prodAlias}</code>
                                <button class="copy-button" onclick="copyCommand('cci-prod-cmd')">Copy</button>
                            </div>
                        </div>

                        <div class="auth-command-group">
                            <div class="auth-command-label">Sandbox:</div>
                            <div class="auth-command-box">
                                <code id="cci-sand-cmd">cci org connect ${sandAlias} --sandbox</code>
                                <button class="copy-button" onclick="copyCommand('cci-sand-cmd')">Copy</button>
                            </div>
                        </div>

                        <div style="margin-top: 12px; font-style: italic; color: var(--color-text);">
                            SSH to your NAS and authenticate with the selected method above.
                        </div>
                    </div>
                `;
            } else {
                html = `
                    <div class="auth-method-block">
                        <div class="auth-method-title">Using Salesforce CLI (sf)</div>

                        <div class="auth-command-group">
                            <div class="auth-command-label">Production:</div>
                            <div class="auth-command-box">
                                <code id="sf-prod-cmd">sf org login web --set-default --alias ${prodAlias} --instance-url &lt;url&gt;</code>
                                <button class="copy-button" onclick="copyCommand('sf-prod-cmd')">Copy</button>
                            </div>
                        </div>

                        <div class="auth-command-group">
                            <div class="auth-command-label">Sandbox:</div>
                            <div class="auth-command-box">
                                <code id="sf-sand-cmd">sf org login web --set-default --alias ${sandAlias} --instance-url &lt;url&gt;</code>
                                <button class="copy-button" onclick="copyCommand('sf-sand-cmd')">Copy</button>
                            </div>
                        </div>

                        <div style="margin-top: 12px; font-style: italic; color: var(--color-text);">
                            SSH to your NAS and authenticate with the selected method above.
                        </div>
                    </div>
                `;
            }

            instrDiv.innerHTML = html;
        }

        function copyCommand(elementId) {
            const elem = document.getElementById(elementId);
            const text = elem.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const oldText = btn.textContent;
                btn.textContent = '✓ Copied';
                setTimeout(() => { btn.textContent = oldText; }, 2000);
            }).catch(err => console.error('Failed to copy:', err));
        }

        document.getElementById('test-jira').addEventListener('click', testJira);
        document.getElementById('test-anthropic').addEventListener('click', testAnthropicAPI);

        // Update instructions when auth method or aliases change
        document.querySelectorAll('input[name="CASEOPS_USE_CCI_FOR_AUTH"]').forEach(radio => {
            radio.addEventListener('change', () => {
                loadStatus();
                updateAuthInstructions();
            });
        });
        document.getElementById('sf-prod-alias').addEventListener('change', updateAuthInstructions);
        document.getElementById('sf-prod-alias').addEventListener('input', updateAuthInstructions);
        document.getElementById('sf-sand-alias').addEventListener('change', updateAuthInstructions);
        document.getElementById('sf-sand-alias').addEventListener('input', updateAuthInstructions);

        // Load on page open
        loadSettings();
        loadStatus();
    </script>
</body>
</html>
