<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaseOps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 48px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 15px; font-weight: 600; color: #e6edf3; }
    #topbar .spacer { flex: 1; }
    #run-status {
      font-size: 12px;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #run-status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #238636;
      transition: background 0.3s;
    }
    #run-status .dot.active { background: #f0883e; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #30363d; border-color: #8b949e; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .btn.primary:hover { background: #388bfd; border-color: #388bfd; }
    .btn.danger { background: #da3633; border-color: #da3633; color: #fff; }

    /* ── Main layout ─────────────────────────────────────────── */
    #layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    #sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 10px 14px 8px;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
    }
    #sidebar-header .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      margin-bottom: 6px;
    }
    #sort-pills {
      display: flex;
      gap: 4px;
    }
    .sort-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid #30363d;
      background: transparent;
      color: #6e7681;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sort-pill:hover { color: #c9d1d9; border-color: #6e7681; }
    .sort-pill.active { background: #21262d; color: #e6edf3; border-color: #8b949e; }
    #issue-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .group-label {
      padding: 8px 14px 4px;
      font-size: 11px;
      font-weight: 600;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .issue-item {
      padding: 8px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .issue-item:hover { background: #1c2128; }
    .issue-item.selected { background: #1c2128; border-left-color: #388bfd; }
    .issue-key {
      font-size: 12px;
      font-weight: 600;
      font-family: "SF Mono", "Fira Code", monospace;
      margin-bottom: 2px;
    }
    .issue-key.active   { color: #388bfd; }
    .issue-key.escalated { color: #f0883e; }
    .issue-key.closed   { color: #6e7681; }
    .issue-summary {
      font-size: 12px;
      color: #8b949e;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      margin-top: 3px;
      font-weight: 500;
    }
    .badge.active    { background: #1f3a5c; color: #79c0ff; }
    .badge.escalated { background: #3d2600; color: #f0883e; }
    .badge.closed    { background: #21262d; color: #6e7681; }

    /* ── Main panel ──────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0d1117;
    }

    #detail-header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
    }
    #detail-title {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 4px;
    }
    #detail-meta { font-size: 12px; color: #8b949e; }

    #detail-actions {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
      flex-wrap: wrap;
      align-items: center;
    }
    #detail-actions .spacer { flex: 1; }

    /* ── Instruction panel ───────────────────────────────────── */
    #instruction-panel {
      padding: 10px 20px 12px;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
      display: none;
    }
    #instruction-context {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .ctx-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
    }
    .ctx-chip.done { color: #3fb950; border-color: #238636; background: #0d2818; }
    .ctx-chip.pending { color: #f0883e; border-color: #6e3a00; background: #2d1800; }
    #instruction-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #instruction-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 13px;
      font-family: inherit;
      padding: 8px 12px;
      resize: vertical;
      min-height: 60px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #instruction-input:focus {
      outline: none;
      border-color: #388bfd;
    }
    #instruction-input::placeholder { color: #484f58; }
    #send-claude-btn {
      flex-shrink: 0;
      padding: 8px 14px;
      white-space: nowrap;
      align-self: flex-end;
    }

    /* ── Tabs ────────────────────────────────────────────────── */
    #tabs {
      display: flex;
      gap: 0;
      padding: 0 20px;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .tab {
      padding: 8px 14px;
      font-size: 13px;
      color: #8b949e;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .tab:hover { color: #c9d1d9; }
    .tab.active { color: #e6edf3; border-bottom-color: #f78166; }

    /* ── Content ─────────────────────────────────────────────── */
    #content-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    #content-area .empty { color: #6e7681; font-style: italic; }

    /* markdown rendering */
    #content-area h1,h2,h3,h4 { color: #e6edf3; margin: 16px 0 8px; font-weight: 600; }
    #content-area h1 { font-size: 20px; border-bottom: 1px solid #21262d; padding-bottom: 8px; }
    #content-area h2 { font-size: 16px; }
    #content-area h3 { font-size: 14px; }
    #content-area p  { color: #c9d1d9; line-height: 1.6; margin-bottom: 10px; }
    #content-area ul,ol { color: #c9d1d9; padding-left: 20px; margin-bottom: 10px; line-height: 1.6; }
    #content-area code {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 5px;
      color: #f0883e;
    }
    #content-area pre {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 14px;
      overflow-x: auto;
      margin-bottom: 12px;
    }
    #content-area pre code {
      background: none;
      border: none;
      padding: 0;
      color: #c9d1d9;
    }
    #content-area table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 14px;
      font-size: 13px;
    }
    #content-area th {
      background: #161b22;
      color: #8b949e;
      text-align: left;
      padding: 6px 10px;
      border: 1px solid #30363d;
      font-weight: 600;
    }
    #content-area td {
      padding: 6px 10px;
      border: 1px solid #21262d;
      color: #c9d1d9;
      vertical-align: top;
    }
    #content-area tr:nth-child(even) td { background: #0d1117; }
    #content-area a { color: #388bfd; }
    #content-area blockquote {
      border-left: 3px solid #30363d;
      padding-left: 12px;
      color: #8b949e;
      margin-bottom: 10px;
    }

    /* ── Log pane ────────────────────────────────────────────── */
    #log-pane {
      height: 180px;
      flex-shrink: 0;
      background: #010409;
      border-top: 1px solid #21262d;
      display: flex;
      flex-direction: column;
    }
    #log-header {
      display: flex;
      align-items: center;
      padding: 4px 12px;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      font-size: 11px;
      color: #6e7681;
      gap: 10px;
    }
    #log-header span { font-weight: 600; }
    #log-clear { margin-left: auto; cursor: pointer; color: #6e7681; font-size: 11px; }
    #log-clear:hover { color: #c9d1d9; }
    #log-output {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 12px;
      color: #8b949e;
      line-height: 1.5;
    }
    #log-output .log-err { color: #f85149; }
    #log-output .log-ok  { color: #3fb950; }
    #log-output .log-info { color: #79c0ff; }

    /* ── Empty state ─────────────────────────────────────────── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #6e7681;
    }
    #empty-state h2 { font-size: 18px; color: #8b949e; }
    #empty-state p  { font-size: 13px; text-align: center; max-width: 320px; line-height: 1.6; }

    /* ── Attachments ─────────────────────────────────────────── */
    .att-divider { border: none; border-top: 1px solid #21262d; margin: 20px 0 16px; }
    .att-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      padding: 4px 0;
    }
    .att-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px;
      width: 180px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .att-card.att-file { width: 260px; }
    .att-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #21262d;
      display: block;
    }
    .att-name {
      font-size: 12px;
      color: #c9d1d9;
      word-break: break-all;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .att-meta { font-size: 11px; color: #6e7681; }
    .att-dl {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #388bfd;
      text-decoration: none;
    }
    .att-dl:hover { text-decoration: underline; }
    .att-icon { font-size: 22px; flex-shrink: 0; }

    /* ── Lightbox ────────────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      cursor: default;
    }
    #lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      font-size: 28px;
      color: #e6edf3;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
    }
    #lightbox-close:hover { opacity: 1; }

    /* ── Post-to-Jira panel ─────────────────────────────────── */
    .jira-post-panel {
      margin-top: 28px;
      border-top: 1px solid #30363d;
      padding-top: 16px;
    }
    .jira-post-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6e7681;
      margin-bottom: 8px;
    }
    .jira-post-editor {
      width: 100%;
      min-height: 180px;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 12px;
      line-height: 1.6;
      resize: vertical;
      transition: border-color 0.15s;
    }
    .jira-post-editor:focus { outline: none; border-color: #388bfd; }
    .jira-post-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .jira-post-status {
      font-size: 12px;
      color: #8b949e;
    }

    /* ── Filter bar ─────────────────────────────────────────── */
    #filter-input {
      width: 100%;
      margin-top: 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 12px;
      padding: 5px 10px;
      transition: border-color 0.15s;
    }
    #filter-input:focus { outline: none; border-color: #388bfd; }
    #filter-input::placeholder { color: #484f58; }

    /* ── Dashboard ───────────────────────────────────────────── */
    #dashboard {
      padding: 32px 28px 20px;
    }
    #dashboard h2 {
      font-size: 18px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 20px;
    }
    .dash-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .dash-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .dash-count {
      font-size: 28px;
      font-weight: 700;
      font-family: "SF Mono", "Fira Code", monospace;
      color: #e6edf3;
      line-height: 1;
      margin-bottom: 4px;
    }
    .dash-label {
      font-size: 11px;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .dash-card.c-active   .dash-count { color: #79c0ff; }
    .dash-card.c-escalated .dash-count { color: #f0883e; }
    .dash-card.c-ready    .dash-count { color: #3fb950; }
    .dash-card.c-pending  .dash-count { color: #8b949e; }

    /* ── Scrollbars ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <h1>CaseOps</h1>
  <div class="spacer"></div>
  <div id="run-status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Idle</span>
  </div>
  <button class="btn" onclick="runAction('sync')">Sync Jira</button>
  <button class="btn" onclick="runAction('triage')">Triage</button>
  <button class="btn primary" onclick="runAction('full')">Full Run</button>
</div>

<!-- Main layout -->
<div id="layout">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="label">Issues</div>
      <div id="sort-pills">
        <button class="sort-pill active" data-sort="number" onclick="setSort('number')">#</button>
        <button class="sort-pill" data-sort="date" onclick="setSort('date')">Date</button>
        <button class="sort-pill" data-sort="status" onclick="setSort('status')">Status</button>
      </div>
      <input id="filter-input" type="search" placeholder="Filter by key or summary…" oninput="filterIssues(this.value)">
    </div>
    <div id="issue-list">
      <div style="padding:20px 14px;color:#6e7681;font-size:12px;">Loading...</div>
    </div>
  </div>

  <!-- Main panel -->
  <div id="main">
    <div id="detail-header">
      <div id="detail-title" style="color:#6e7681;">Select an issue</div>
      <div id="detail-meta"></div>
    </div>
    <div id="detail-actions" style="display:none"></div>
    <div id="instruction-panel">
      <div id="instruction-context"></div>
      <div id="instruction-row">
        <textarea id="instruction-input" placeholder="Instruct Claude on what to do next…&#10;e.g. &quot;Draft the Jira message based on the investigation&quot;"></textarea>
        <button id="send-claude-btn" class="btn primary" onclick="sendInstruction()">Send to Claude</button>
      </div>
    </div>
    <div id="tabs" style="display:none"></div>
    <div id="content-area">
      <div id="dashboard">
        <h2>Overview</h2>
        <div class="dash-cards">
          <div class="dash-card c-active">
            <div class="dash-count" id="dash-active">—</div>
            <div class="dash-label">Active</div>
          </div>
          <div class="dash-card c-escalated">
            <div class="dash-count" id="dash-escalated">—</div>
            <div class="dash-label">Escalated</div>
          </div>
          <div class="dash-card c-ready">
            <div class="dash-count" id="dash-ready">—</div>
            <div class="dash-label">Jira Draft Ready</div>
          </div>
          <div class="dash-card c-pending">
            <div class="dash-count" id="dash-pending">—</div>
            <div class="dash-label">Pending Work</div>
          </div>
        </div>
        {% if not has_manifest %}
        <button class="btn primary" onclick="runAction('sync')" style="margin-top:20px;">Sync Jira Now</button>
        {% endif %}
      </div>
    </div>
    <div id="log-pane">
      <div id="log-header">
        <span>Pipeline Log</span>
        <span id="log-clear" onclick="clearLog()">Clear</span>
      </div>
      <div id="log-output"></div>
    </div>
  </div>

</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <span id="lightbox-close" onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
</div>

<script>
  let activeKey = null;
  let activeTab = null;
  let eventSource = null;
  const activeRuns = new Set();
  let currentSort = 'number';
  let cachedIssues = [];

  // ── SSE stream (persistent) ────────────────────────────────

  function initStream() {
    if (eventSource) return;
    eventSource = new EventSource('/api/stream');
    eventSource.onmessage = e => {
      const msg = e.data;
      if (msg.startsWith('__done__|')) {
        const runKey = msg.slice(9);
        activeRuns.delete(runKey);
        updateStatus();
        // Re-enable buttons for this run key
        setIssueRunning(runKey, false);
        logLine(`Done: ${runKey === '__global__' ? 'global run' : runKey}`, 'ok', runKey);
        // Refresh UI
        if (runKey === '__global__') {
          loadIssues();
          if (activeKey) selectIssue(activeKey);
        } else {
          refreshSidebarItem(runKey);
          if (activeKey === runKey) selectIssue(runKey);
        }
      } else {
        // Format: "run_key|log line"
        const sep = msg.indexOf('|');
        if (sep !== -1) {
          const runKey = msg.slice(0, sep);
          const line   = msg.slice(sep + 1);
          logLine(line, undefined, runKey);
        } else {
          logLine(msg);
        }
      }
    };
    // On error the browser auto-reconnects; don't force close.
    eventSource.onerror = () => {};
  }

  function updateStatus() {
    const n = activeRuns.size;
    document.getElementById('status-dot').classList.toggle('active', n > 0);
    document.getElementById('status-text').textContent =
      n === 0 ? 'Idle' : n === 1 ? 'Running...' : `Running (${n})`;
  }

  // Disable/enable the action buttons for a specific issue key.
  function setIssueRunning(runKey, running) {
    if (runKey === '__global__') {
      document.querySelectorAll('#topbar .btn').forEach(b => b.disabled = running);
    } else {
      document.querySelectorAll(`#detail-actions .btn[data-run-key="${runKey}"]`)
        .forEach(b => b.disabled = running);
      if (activeKey === runKey) {
        const btn = document.getElementById('send-claude-btn');
        if (btn) btn.disabled = running;
      }
    }
  }

  // ── Issue list ─────────────────────────────────────────────

  async function loadIssues() {
    const res = await fetch('/api/issues');
    cachedIssues = await res.json();
    updateDashboard(cachedIssues);
    const q = document.getElementById('filter-input').value;
    renderIssueList(q ? cachedIssues.filter(i => matchesFilter(i, q)) : cachedIssues);
  }

  function updateDashboard(issues) {
    const active    = issues.filter(i => i.disposition === 'active').length;
    const escalated = issues.filter(i => i.disposition === 'escalated').length;
    const ready     = issues.filter(i => i.has_jira_message).length;
    const pending   = issues.filter(i => i.disposition === 'active' && !i.has_jira_message).length;
    document.getElementById('dash-active').textContent    = active;
    document.getElementById('dash-escalated').textContent = escalated;
    document.getElementById('dash-ready').textContent     = ready;
    document.getElementById('dash-pending').textContent   = pending;
  }

  function matchesFilter(issue, q) {
    q = q.toLowerCase();
    return issue.key.toLowerCase().includes(q) || issue.summary.toLowerCase().includes(q);
  }

  function filterIssues(q) {
    const filtered = q ? cachedIssues.filter(i => matchesFilter(i, q)) : cachedIssues;
    renderIssueList(filtered);
  }

  function sortedGroup(issues) {
    return [...issues].sort((a, b) => {
      if (currentSort === 'number') {
        const na = parseInt(a.key.split('-')[1]) || 0;
        const nb = parseInt(b.key.split('-')[1]) || 0;
        return nb - na; // newest number first
      }
      if (currentSort === 'date') {
        return b.updated.localeCompare(a.updated); // newest date first
      }
      if (currentSort === 'status') {
        return a.status.localeCompare(b.status) || b.key.localeCompare(a.key);
      }
      return 0;
    });
  }

  function setSort(sort) {
    currentSort = sort;
    document.querySelectorAll('.sort-pill').forEach(p =>
      p.classList.toggle('active', p.dataset.sort === sort));
    renderIssueList(cachedIssues);
  }

  function renderIssueList(issues) {
    const active    = sortedGroup(issues.filter(i => i.disposition === 'active'));
    const escalated = sortedGroup(issues.filter(i => i.disposition === 'escalated'));
    const closed    = sortedGroup(issues.filter(i => i.disposition === 'closed'));

    const el = document.getElementById('issue-list');
    el.innerHTML = '';

    if (issues.length === 0) {
      el.innerHTML = '<div style="padding:20px 14px;color:#6e7681;font-size:12px;">No issues. Run a sync.</div>';
      return;
    }

    if (active.length)    renderGroup(el, 'Active', active);
    if (escalated.length) renderGroup(el, 'Escalated', escalated);
    if (closed.length)    renderGroup(el, 'Closed / Resolved', closed);
  }

  function renderGroup(container, label, issues) {
    const g = document.createElement('div');
    g.innerHTML = `<div class="group-label">${label}</div>`;
    issues.forEach(issue => {
      const item = document.createElement('div');
      item.className = 'issue-item' + (issue.key === activeKey ? ' selected' : '');
      item.dataset.key = issue.key;
      item.onclick = () => selectIssue(issue.key);
      item.innerHTML = `
        <div class="issue-key ${issue.disposition}">${issue.key}</div>
        <div class="issue-summary">${escHtml(issue.summary)}</div>
        <span class="badge ${issue.disposition}">${escHtml(issue.status)}</span>
      `;
      g.appendChild(item);
    });
    container.appendChild(g);
  }

  // ── Issue detail ───────────────────────────────────────────

  async function selectIssue(key) {
    activeKey = key;
    renderLogForKey(key);

    // highlight sidebar
    document.querySelectorAll('.issue-item').forEach(el => {
      el.classList.toggle('selected', el.dataset.key === key);
    });

    const res = await fetch(`/api/issue/${key}`);
    const issue = await res.json();

    const dash = document.getElementById('dashboard');
    if (dash) dash.style.display = 'none';
    document.getElementById('detail-title').textContent = `${issue.key} — ${issue.summary}`;
    document.getElementById('detail-title').style.color = '';
    document.getElementById('detail-meta').textContent =
      `Status: ${issue.status}   |   Updated: ${issue.updated || '—'}`;

    // actions
    const actionsEl = document.getElementById('detail-actions');
    actionsEl.style.display = 'flex';
    const isRunning = activeRuns.has(key);
    const jiraLink = issue.jira_url
      ? `<a class="btn" href="${escHtml(issue.jira_url)}" target="_blank" rel="noopener">View in Jira</a>`
      : '';
    actionsEl.innerHTML = `
      <button class="btn" data-run-key="${key}" onclick="runAction('sync_issue','${key}')"
        ${isRunning ? 'disabled' : ''}>Sync This Issue</button>
      <button class="btn primary" data-run-key="${key}" onclick="runAction('full_issue','${key}')"
        ${isRunning ? 'disabled' : ''}>Run Pipeline For This Issue</button>
      <select id="transition-select" class="btn" style="padding:5px 8px;">
        <option value="">Change status…</option>
      </select>
      <button class="btn primary" id="transition-btn" onclick="applyTransition('${key}')" disabled>Apply</button>
      <span id="transition-status" style="font-size:12px;"></span>
      <select id="message-select" class="btn" style="padding:5px 8px;">
        <option value="">Send message…</option>
      </select>
      <button class="btn primary" id="message-btn" onclick="sendCannedMessage('${key}')" disabled>Send</button>
      <span id="message-status" style="font-size:12px;"></span>
      <div class="spacer"></div>
      ${jiraLink}
      <button class="btn" onclick="copyPrompt(${JSON.stringify(issue.claude_prompt)})">Copy Claude Prompt</button>
    `;

    // tabs
    const tabsEl = document.getElementById('tabs');
    tabsEl.style.display = 'flex';
    tabsEl.innerHTML = '';

    if (issue.tabs.length === 0) {
      tabsEl.innerHTML = '<div class="tab" style="color:#6e7681;cursor:default;">No files yet</div>';
      document.getElementById('content-area').innerHTML =
        '<p class="empty" style="margin-top:20px;">Run the pipeline to generate files for this issue.</p>';
      return;
    }

    issue.tabs.forEach((tab, i) => {
      const el = document.createElement('div');
      el.className = 'tab' + (i === 0 ? ' active' : '');
      el.textContent = tab.label;
      el.dataset.ftype = tab.id;
      el.onclick = () => selectTab(key, tab.id, el);
      tabsEl.appendChild(el);
    });

    // Restore previously active tab if it still exists, else default to first.
    const preferred = activeTab && issue.tabs.find(t => t.id === activeTab);
    const targetTab = preferred || issue.tabs[0];
    const targetEl = tabsEl.querySelector(`[data-ftype="${targetTab.id}"]`);
    if (targetEl) selectTab(key, targetTab.id, targetEl);

    renderInstructionPanel(issue);
    loadTransitions(key);
    loadCannedMessages(key, issue.status);
  }

  async function selectTab(key, ftype, tabEl) {
    activeTab = ftype;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');

    document.getElementById('content-area').innerHTML =
      '<p style="color:#6e7681;padding:20px;">Loading...</p>';

    const res = await fetch(`/api/issue/${key}/file/${ftype}`);
    const data = await res.json();
    const area = document.getElementById('content-area');
    area.innerHTML = data.html || '<p class="empty">Empty.</p>';

    if (ftype === 'jira_summary') {
      await appendAttachments(key, area);
    }
    if ((ftype === 'jira_message' || ftype === 'internal_notes') && data.raw) {
      appendPostPanel(key, ftype, data.raw, area);
    }
  }

  function appendPostPanel(key, ftype, rawText, area) {
    const isPublic = ftype === 'jira_message';
    const btnLabel = isPublic ? 'Post Public Comment to Jira' : 'Post Internal Note to Jira';
    const btnClass = isPublic ? 'btn primary' : 'btn';

    const panel = document.createElement('div');
    panel.className = 'jira-post-panel';
    panel.innerHTML = `
      <div class="jira-post-label">${isPublic ? 'Public Reply' : 'Internal Note'} — edit before posting</div>
      <textarea class="jira-post-editor" id="jira-editor-${ftype}"></textarea>
      <div class="jira-post-actions">
        <button class="${btnClass}" id="jira-post-btn-${ftype}"
          onclick="postToJira('${escHtml(key)}','${ftype}',${isPublic})">
          ${btnLabel}
        </button>
        <span class="jira-post-status" id="jira-post-status-${ftype}"></span>
      </div>
    `;
    area.appendChild(panel);
    // Set value after insertion to avoid HTML escaping issues
    document.getElementById(`jira-editor-${ftype}`).value = rawText;
  }

  async function postToJira(key, ftype, isPublic) {
    const editor  = document.getElementById(`jira-editor-${ftype}`);
    const btn     = document.getElementById(`jira-post-btn-${ftype}`);
    const statusEl = document.getElementById(`jira-post-status-${ftype}`);

    const body = editor ? editor.value.trim() : '';
    if (!body) { statusEl.textContent = 'Nothing to post.'; return; }

    btn.disabled = true;
    statusEl.style.color = '#8b949e';
    statusEl.textContent = 'Posting…';

    try {
      const res = await fetch(`/api/issue/${key}/comment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ body, public: isPublic }),
      });
      const data = await res.json();
      if (res.ok) {
        statusEl.style.color = '#3fb950';
        statusEl.textContent = 'Posted successfully.';
        logLine(`Posted ${isPublic ? 'public comment' : 'internal note'} to ${key}`, 'ok', key);
      } else {
        statusEl.style.color = '#f85149';
        statusEl.textContent = data.error || 'Failed.';
        btn.disabled = false;
      }
    } catch (e) {
      statusEl.style.color = '#f85149';
      statusEl.textContent = e.message;
      btn.disabled = false;
    }
  }

  async function loadTransitions(key) {
    const sel = document.getElementById('transition-select');
    const btn = document.getElementById('transition-btn');
    if (!sel) return;
    sel.innerHTML = '<option value="">Loading…</option>';
    try {
      const res = await fetch(`/api/issue/${key}/transitions`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');
      sel.innerHTML = '<option value="">Change status…</option>' +
        data.map(t => `<option value="${escHtml(t.id)}" data-status="${escHtml(t.to_status)}">${escHtml(t.name)}</option>`).join('');
      sel.onchange = () => { btn.disabled = !sel.value; };
    } catch(e) {
      sel.innerHTML = `<option value="">Error: ${escHtml(e.message)}</option>`;
    }
  }

  async function applyTransition(key) {
    const sel = document.getElementById('transition-select');
    const btn = document.getElementById('transition-btn');
    const statusEl = document.getElementById('transition-status');
    const opt = sel.options[sel.selectedIndex];
    const transition_id = sel.value;
    const new_status = opt.getAttribute('data-status') || '';
    if (!transition_id) return;

    btn.disabled = true;
    statusEl.style.color = '#8b949e';
    statusEl.textContent = 'Applying…';

    try {
      const res = await fetch(`/api/issue/${key}/transition`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transition_id, new_status }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');

      // Update detail-meta status text
      const meta = document.getElementById('detail-meta');
      if (meta) {
        const oldText = meta.textContent;
        const newText = oldText.replace(/Status: [^|]+/, `Status: ${new_status}`);
        meta.textContent = newText;
      }

      statusEl.style.color = '#3fb950';
      statusEl.textContent = `→ ${new_status}`;
      logLine(`Transitioned ${key} to ${new_status}`, 'ok', key);

      // Re-load issue list so sidebar badge/group updates
      await loadIssues();
    } catch(e) {
      statusEl.style.color = '#f85149';
      statusEl.textContent = e.message;
      btn.disabled = false;
    }
  }

  async function loadCannedMessages(key, status) {
    const sel = document.getElementById('message-select');
    const btn = document.getElementById('message-btn');
    if (!sel) return;
    sel.innerHTML = '<option value="">Loading…</option>';
    try {
      const res = await fetch(`/api/canned-messages`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');

      // Filter messages based on status
      const available = data.filter(m => {
        if (m.id === 'initial-response') {
          return status === 'Waiting for support';
        }
        return true;
      });

      if (available.length === 0) {
        sel.innerHTML = '<option value="">No messages available</option>';
        btn.disabled = true;
      } else {
        sel.innerHTML = '<option value="">Send message…</option>' +
          available.map(m => `<option value="${escHtml(m.id)}">${escHtml(m.name)}</option>`).join('');
        sel.onchange = () => { btn.disabled = !sel.value; };
      }
    } catch(e) {
      sel.innerHTML = `<option value="">Error: ${escHtml(e.message)}</option>`;
    }
  }

  async function sendCannedMessage(key) {
    const sel = document.getElementById('message-select');
    const btn = document.getElementById('message-btn');
    const statusEl = document.getElementById('message-status');
    const message_id = sel.value;
    if (!message_id) return;

    btn.disabled = true;
    statusEl.style.color = '#8b949e';
    statusEl.textContent = 'Sending…';

    try {
      const res = await fetch(`/api/issue/${key}/send-canned-message`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message_id }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');

      statusEl.style.color = '#3fb950';
      statusEl.textContent = '✓ Sent';
      logLine(`Sent message to ${key}`, 'ok', key);
      sel.value = '';
      btn.disabled = true;

      // Auto-transition to In Progress if sent message was Initial Response
      if (message_id === 'initial-response') {
        try {
          const transRes = await fetch(`/api/issue/${key}/transitions`);
          const transitions = await transRes.json();
          const inProgressTrans = transitions.find(t => t.to_status && t.to_status.toLowerCase() === 'in progress');
          if (inProgressTrans) {
            const transRes2 = await fetch(`/api/issue/${key}/transition`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ transition_id: inProgressTrans.id, new_status: inProgressTrans.to_status }),
            });
            const transData = await transRes2.json();
            if (transRes2.ok) {
              statusEl.style.color = '#3fb950';
              statusEl.textContent = '✓ Sent & Transitioned to In Progress';
              const meta = document.getElementById('detail-meta');
              if (meta) {
                const oldText = meta.textContent;
                const newText = oldText.replace(/Status: [^|]+/, `Status: ${inProgressTrans.to_status}`);
                meta.textContent = newText;
              }
              await loadIssues();
            } else {
              statusEl.textContent = '✓ Sent';
            }
          } else {
            statusEl.textContent = '✓ Sent';
          }
        } catch(transErr) {
          statusEl.textContent = '✓ Sent';
        }
      }
    } catch(e) {
      statusEl.style.color = '#f85149';
      statusEl.textContent = e.message;
      btn.disabled = false;
    }
  }

  async function appendAttachments(key, area) {
    let atts;
    try {
      const res = await fetch(`/api/issue/${key}/attachments`);
      atts = await res.json();
    } catch (_) { return; }
    if (!Array.isArray(atts) || atts.length === 0) return;

    // Find the "Attachments" heading in the rendered markdown
    const headings = area.querySelectorAll('h1,h2,h3,h4');
    let attHeading = null;
    for (const h of headings) {
      if (h.textContent.trim().toLowerCase().startsWith('attachment')) {
        attHeading = h;
        break;
      }
    }

    let html = `<div class="att-grid">`;
    for (const a of atts) {
      const isImage = a.mimeType && a.mimeType.startsWith('image/');
      const isPdf   = a.mimeType === 'application/pdf';
      const kb      = a.size ? (a.size / 1024).toFixed(1) + ' KB' : '';
      const date    = a.created ? a.created.slice(0, 10) : '';
      const by      = a.author ? ` by ${escHtml(a.author)}` : '';
      const meta    = [kb, date ? `${date}${by}` : ''].filter(Boolean).join(' · ');

      if (isImage) {
        html += `
          <div class="att-card">
            <img class="att-img" src="${escHtml(a.url)}" alt="${escHtml(a.filename)}" loading="lazy"
                 style="cursor:zoom-in"
                 data-lb-url="${escHtml(a.url)}" data-lb-alt="${escHtml(a.filename)}">
            <div class="att-name">${escHtml(a.filename)}</div>
            <div class="att-meta">${escHtml(meta)}</div>
          </div>`;
      } else {
        const icon = isPdf ? '📄' : '📎';
        html += `
          <div class="att-card att-file">
            <a class="att-dl" href="${escHtml(a.url)}" target="_blank" download="${escHtml(a.filename)}">
              <span class="att-icon">${icon}</span>
              <span class="att-name">${escHtml(a.filename)}</span>
            </a>
            <div class="att-meta">${escHtml(meta)}</div>
          </div>`;
      }
    }
    html += `</div>`;

    const frag = document.createElement('div');
    frag.innerHTML = html;

    if (attHeading) {
      // Remove the bullet list that follows the heading (the text paths)
      let next = attHeading.nextElementSibling;
      while (next && (next.tagName === 'UL' || next.tagName === 'OL' || next.tagName === 'P')) {
        const toRemove = next;
        next = next.nextElementSibling;
        toRemove.remove();
      }
      attHeading.insertAdjacentElement('afterend', frag);
    } else {
      // Fallback: append at bottom with a divider
      const divider = document.createElement('hr');
      divider.className = 'att-divider';
      area.appendChild(divider);
      const heading = document.createElement('h2');
      heading.style.marginBottom = '12px';
      heading.textContent = `Attachments (${atts.length})`;
      area.appendChild(heading);
      area.appendChild(frag);
    }

    area.querySelectorAll('img[data-lb-url]').forEach(img => {
      img.addEventListener('click', () => openLightbox(img.dataset.lbUrl, img.dataset.lbAlt));
    });
  }

  // ── Pipeline actions ───────────────────────────────────────

  async function runAction(action, key, instruction) {
    const runKey = (action === 'sync' || action === 'triage' || action === 'full')
      ? '__global__' : (key || '__global__');

    if (activeRuns.has(runKey)) {
      logLine(`Already running: ${runKey === '__global__' ? 'global action' : runKey}`, 'err', runKey);
      return;
    }

    logLine(`Starting: ${action}${key ? ' ' + key : ''}...`, 'info', runKey);

    const body = { action, key: key || '' };
    if (instruction) body.instruction = instruction;

    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) {
      logLine(data.error || 'Failed to start.', 'err', runKey);
      return;
    }

    activeRuns.add(runKey);
    updateStatus();
    setIssueRunning(runKey, true);
  }

  // Refresh a single issue's sidebar chip without touching other items.
  async function refreshSidebarItem(key) {
    try {
      const res = await fetch(`/api/issue/${key}`);
      if (!res.ok) return;
      const issue = await res.json();
      const item = document.querySelector(`.issue-item[data-key="${key}"]`);
      if (!item) {
        // Issue wasn't in the list before (e.g. newly synced); reload all.
        loadIssues();
        return;
      }
      item.querySelector('.issue-key').textContent = issue.key;
      item.querySelector('.issue-summary').textContent = issue.summary;
      const badge = item.querySelector('.badge');
      badge.textContent = issue.status;
      badge.className = `badge ${issue.disposition}`;
    } catch (_) {
      // Network error — leave sidebar as-is.
    }
  }

  // ── Log ───────────────────────────────────────────────────

  // Per-key log buffers. Key is run_key (issue key or '__global__').
  const logBuffers = {};

  function _logBuf(key) {
    if (!logBuffers[key]) logBuffers[key] = [];
    return logBuffers[key];
  }

  function _appendLogDOM(text, cls) {
    const el = document.getElementById('log-output');
    const line = document.createElement('div');
    if (cls) line.className = `log-${cls}`;
    line.textContent = text;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  function logLine(text, cls, forKey) {
    const key = forKey !== undefined ? forKey : (activeKey || '__global__');
    _logBuf(key).push({text, cls});
    if (key === (activeKey || '__global__')) _appendLogDOM(text, cls);
  }

  function renderLogForKey(key) {
    const el = document.getElementById('log-output');
    el.innerHTML = '';
    (_logBuf(key)).forEach(({text, cls}) => _appendLogDOM(text, cls));
  }

  function clearLog() {
    const key = activeKey || '__global__';
    logBuffers[key] = [];
    document.getElementById('log-output').innerHTML = '';
  }

  // ── Clipboard ─────────────────────────────────────────────

  function copyPrompt(text) {
    navigator.clipboard.writeText(text).then(() => {
      logLine('Claude prompt copied to clipboard.', 'ok');
    }).catch(() => {
      logLine('Clipboard write failed. Check browser permissions.', 'err');
    });
  }

  // ── Instruction panel ─────────────────────────────────────

  function renderInstructionPanel(issue) {
    const panel = document.getElementById('instruction-panel');
    panel.style.display = 'block';

    // Derive pipeline stage from existing tabs
    const tabIds = new Set((issue.tabs || []).map(t => t.id));
    const chips = [];

    const stageMap = [
      { id: 'jira_summary',   label: 'Synced',           group: 'done'    },
      { id: 'investigation',  label: 'Investigated',      group: 'done'    },
      { id: 'test_report',    label: 'Tested',            group: 'done'    },
      { id: 'internal_notes', label: 'Notes drafted',     group: 'done'    },
      { id: 'jira_message',   label: 'Jira message',      group: 'done'    },
      { id: 'eng_handoff',    label: 'Eng escalation',    group: 'done'    },
      { id: 'closed_resolved',label: 'Closed/Resolved',   group: 'done'    },
    ];
    const pending = [
      { id: 'investigation',  label: 'Investigation needed' },
      { id: 'jira_message',   label: 'Jira message pending' },
    ];

    stageMap.forEach(s => {
      if (tabIds.has(s.id)) chips.push({ label: s.label, cls: 'done' });
    });
    pending.forEach(s => {
      if (!tabIds.has(s.id) && s.id !== 'investigation' || (!tabIds.has('investigation') && s.id === 'investigation')) {
        if (!tabIds.has(s.id)) chips.push({ label: s.label, cls: 'pending' });
      }
    });

    const ctxEl = document.getElementById('instruction-context');
    ctxEl.innerHTML =
      `<span class="ctx-chip">${escHtml(issue.key)}</span>` +
      `<span class="ctx-chip">${escHtml(issue.status)}</span>` +
      chips.map(c => `<span class="ctx-chip ${c.cls}">${escHtml(c.label)}</span>`).join('');

    // Update send button disabled state
    document.getElementById('send-claude-btn').disabled = activeRuns.has(issue.key);
  }

  async function sendInstruction() {
    const instruction = document.getElementById('instruction-input').value.trim();
    if (!instruction) {
      logLine('Enter an instruction first.', 'err');
      return;
    }
    if (!activeKey) return;
    await runAction('claude_instruction', activeKey, instruction);
    // Clear the textarea after sending
    document.getElementById('instruction-input').value = '';
  }

  // ── Lightbox ──────────────────────────────────────────────

  function openLightbox(url, alt) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = url;
    document.getElementById('lightbox-img').alt = alt;
    lb.classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });

  // ── Utilities ─────────────────────────────────────────────

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Init ──────────────────────────────────────────────────

  loadIssues();
  initStream();
</script>
</body>
