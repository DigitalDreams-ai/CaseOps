<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Abstract CaseOps icon: flowing solution through nested circles -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle (operation/scope) - bold -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#00d9ff" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Inner circle (focus/case) -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#00d9ff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Subtle glow around center -->
  <circle cx="32" cy="32" r="8" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.4"/>

  <!-- Dynamic flow line (solution flowing through) -->
  <path d="M 32 6 Q 24 18 32 32 Q 40 46 32 58"
        fill="none" stroke="#00ff88" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Prominent checkmark (solution found) -->
  <path d="M 24 32 L 32 40 L 42 24"
        fill="none" stroke="#00ff88" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
