<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Abstract CaseOps icon: flowing solution through nested circles -->

  <!-- Outer circle (operation/scope) -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#00d9ff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Inner circle (focus/case) -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#00d9ff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Flow line (solution flowing through) - starts outside, flows in -->
  <path d="M 32 10 Q 30 22 32 32 Q 34 42 32 54"
        fill="none" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Solution indicator (checkmark at center) -->
  <path d="M 28 32 L 31 35 L 36 28"
        fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
