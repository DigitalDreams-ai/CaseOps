<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Briefcase body -->
  <path d="M 20 40 L 20 90 C 20 100 28 108 38 108 L 82 108 C 92 108 100 100 100 90 L 100 40 Z"
        fill="#00d9ff" stroke="#0088cc" stroke-width="2"/>

  <!-- Briefcase handle -->
  <path d="M 35 40 Q 60 15 85 40"
        fill="none" stroke="#00d9ff" stroke-width="3" stroke-linecap="round"/>

  <!-- Latch -->
  <rect x="56" y="35" width="8" height="8" fill="#0088cc" rx="1"/>

  <!-- Solved cases (checkmarks in grid) -->
  <g stroke="#00ff88" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top left -->
    <path d="M 32 55 L 36 59 L 42 51"/>
    <!-- Top right -->
    <path d="M 78 55 L 82 59 L 88 51"/>
    <!-- Bottom left -->
    <path d="M 32 85 L 36 89 L 42 81"/>
    <!-- Bottom right -->
    <path d="M 78 85 L 82 89 L 88 81"/>
  </g>

  <!-- Automation spark (lightning bolt) -->
  <g transform="translate(60, 30)">
    <path d="M 0 -8 L -4 0 L -2 0 L 4 12 L 2 8 L 4 8 Z"
          fill="#ffaa00" stroke="#ff8800" stroke-width="0.5"/>
  </g>
</svg>
