<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Abstract CaseOps icon: flowing solution through nested circles -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle (operation/scope) - bold, larger -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#00d9ff" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Inner circle (focus/case) - more prominent -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="#00d9ff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Subtle glow around center -->
  <circle cx="32" cy="32" r="9" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.5"/>

  <!-- Dynamic flow line (solution flowing through) - more visible -->
  <path d="M 32 4 Q 22 16 32 32 Q 42 48 32 60"
        fill="none" stroke="#00ff88" stroke-width="4" stroke-linecap="round"/>

  <!-- Large, distinctive checkmark (solution found) -->
  <path d="M 22 32 L 30 41 L 44 22"
        fill="none" stroke="#00ff88" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
