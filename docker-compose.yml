version: '3.8'

services:
  caseops:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caseops
    ports:
      - "5350:5000"
    env_file:
      - .env.jira.nas
    volumes:
      # Persistent state for single-instance NAS lives in appdata.
      - /volume1/docker/appdata/caseops/instance1:/app/instance1
      # Mount .env.jira.nas for NAS/Linux (use .env.jira for local Windows dev).
      # Must be writable: token refresh and Settings update this file.
      - ./.env.jira.nas:/app/.env.jira
      # Live app code mounted read-only for predictable pilot deployments.
      # Sync to NAS + restart is enough for app/templates/static/skills changes.
      - ./app.py:/app/app.py:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
      - ./skills:/app/skills:ro
      - ./scripts:/app/scripts:ro
      # Note: .sfdx and .claude mounted from NAS had permission conflicts.
      # Claude Code auth is stored in .env.jira.nas as CLAUDE_CODE_OAUTH_TOKEN.
      # Use /setup/claude-login to save/update the token.
      # Salesforce orgs authenticated via SF_PROD/SANDBOX env vars at startup.
      # (Optional) Mount workspace-specific .env.jira.{workspace} files
      # - ./.env.jira.production:/app/.env.jira.production:ro
    environment:
      # Flask listens internally on 5000; exposed as 5350 on host
      CASEOPS_PORT: "5000"
      HOME: /home/caseops
      SF_DATA_DIR: /app/instance1/.sf
      SFDX_DIR: /app/instance1/.sfdx
      # Single-instance NAS deployment: use appdata-backed instance1 directory
      CASEOPS_OUTPUTS_DIR: "/app/instance1/outputs"
      CASEOPS_JIRA_OUT_DIR: "/app/instance1/outputs/jira"
      # Optional: set workspace
      # CASEOPS_WORKSPACE: "default"
      # Salesforce credentials: loaded from .env.jira.nas via env_file directive above
      # CASEOPS_PRODUCTION_READ_ORG, CASEOPS_SANDBOX_TARGET_ORG, CASEOPS_*_INSTANCE_URL, SF_PROD_*, SF_SANDBOX_* all available
    restart: unless-stopped
    # Match NAS host ownership for bind mounts via image user mapping.
    # Synology-specific: change "bridge" to your network if using custom network
    networks:
      - caseops-net


networks:
  caseops-net:
    driver: bridge
