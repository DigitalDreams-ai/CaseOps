version: '3.8'

services:
  caseops:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caseops
    ports:
      - "5350:5000"
    volumes:
      # Persistent output files (use ./outputs for local Windows, /volume1/... for NAS)
      - ./outputs:/app/outputs
      # Mount .env.jira.nas for NAS/Linux (use .env.jira for local Windows dev)
      - ./.env.jira.nas:/app/.env.jira:ro
      # Mount app.py (override baked-in version from COPY . /app)
      - ./app.py:/app/app.py:ro
      # Mount templates (override baked-in version from COPY . /app)
      - ./templates:/app/templates:ro
      # Mount static assets (override baked-in version from COPY . /app)
      - ./static:/app/static:ro
      # Mount Salesforce CLI auth (pre-authenticated orgs on host - NAS docker user)
      - ~/.sfdx:/home/caseops/.sfdx
      # Mount Claude Code CLI auth (pre-authenticated on host - NAS docker user)
      - ~/.claude:/home/caseops/.claude
      # (Optional) Mount workspace-specific .env.jira.{workspace} files
      # - ./.env.jira.production:/app/.env.jira.production:ro
    environment:
      # Flask listens internally on 5000; exposed as 5350 on host
      CASEOPS_PORT: "5000"
      # Optional: set workspace
      # CASEOPS_WORKSPACE: "default"
      # For Claude Code CLI mode: omit ANTHROPIC_API_KEY from here
      # (it will be read from .env.jira only)
    restart: unless-stopped
    # Synology-specific: change "bridge" to your network if using custom network
    networks:
      - caseops-net


networks:
  caseops-net:
    driver: bridge
