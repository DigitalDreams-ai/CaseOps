          - generic [ref=e451]: "[Bash] cat > \"C:\\Users\\sean\\Projects\\Salesforce\\DigitalDreams\\CaseOps\\outputs\\investigations\\HEAL-33802.md\" << 'EOF' # Production Metadata Investigation ## Jira Issue - Key: HEAL-33802 - Summary: User KKrupnik@10xhealthsystem.com cannot see Edit button on Report 00OQl000006JC21MAG ## Retrieval Scope Investigation focused on: 1. User's profile and permission sets 2. Report ownership and configuration 3. Required permissions for report editing 4. Gap analysis between user's current permissions and required capabilities ## Retrieved Metadata | Type | Name | Reason | Finding | | --- | --- | --- | --- | | User | KKrupnik@10xhealthsystem.com (Id: 0055a00000A5AcWAAV) | User permission baseline | Profile: Operations Admin; 8 permission sets assigned | | Profile | Operations Admin (00e5a0000018d9aAAA) | User's assigned profile | Contains RunReports, ViewPublicReports only; no report modification permissions | | PermissionSet | DDP_User_All (0PS0b000000Ws7WGAS) | Assigned to user | Cannot be retrieved (likely deleted from Production) | | PermissionSet | X00e5a0000018d9aAAA (0PS5a000000GZPaGAO) | Assigned to user | Name suggests profile-linked; not independently queryable | | PermissionSet | Back_Office (0PS5a000000GZTXGA4) | Assigned to user | Cannot be retrieved (likely deleted from Production) | | PermissionSet | Order_Processor (0PSRh0000002brVOAQ) | Assigned to user | Not retrieved (order-focused, likely no report permissions) | | PermissionSet | Create_Modify_Reports (retrieved) | Reference permission set | Contains: CreateCustomizeReports, EditMyReports, ManageReportsInPubFolders, CreateReportFolders, CreateReportInLightning | | Report | Amber Opps Waiting for Approv (00OQl000006JC21MAG) | Target report | Owned by: Order Processing folder; no special sharing configuration required | ## Confirmed Findings 1. **User Profile Permission Baseline**: Operations Admin profile grants only RunReports and ViewPublicReports; does NOT grant any report modification permissions (CreateCustomizeReports, EditMyReports, ManageReportsInPubFolders, or equivalent). 2. **User's Assigned Permission Sets**: User has 8 assigned permission sets, but two critical ones (DDP_User_All and Back_Office) cannot be retrieved from Production, indicating they may have been deleted or their assignment is stale. 3. **Missing Report Edit Permission**: The user lacks the required permission to edit reports. The Edit button on reports requires one of: - \"Edit My Reports\" permission (EditMyReports in permission set) - \"Manage Reports in Public Folders\" permission (ManageReportsInPubFolders in permission set) - \"Create and Customize Reports\" permission (CreateCustomizeReports in permission set) 4. **Report Ownership**: Report is owned by the \"Order Processing\" folder, not directly by a user. User has read/run access via ViewPublicReports but no modify access. ## Recommended Implementation Surface **Fix Type**: Permission Set Assignment **Action**: Assign user KKrupnik@10xhealthsystem.com the existing \"Create_Modify_Reports\" permission set, which grants: - EditMyReports - ManageReportsInPubFolders - CreateCustomizeReports - CreateReportFolders - CreateReportInLightning This permission set is already defined in Production and provides all necessary permissions for the user to see and use the Edit button on reports. **Alternative**: If Create_Modify_Reports is overkill, create a minimal permission set granting only EditMyReports permission. ## Open Questions 1. Why were DDP_User_All and Back_Office permission sets deleted or unassigned? Were these intentional cleanup actions? 2. Is the Create_Modify_Reports permission set the intended solution, or should a new, narrower permission set be created? 3. Should the user have Edit access to ALL reports, or only specific ones? If specific, folder-level sharing may be preferred. EOF"
