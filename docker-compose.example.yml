services:
  caseops:
    image: ${CASEOPS_IMAGE:-ghcr.io/digitaldreams-ai/caseops:0.1.26}
    container_name: caseops
    ports:
      - "${CASEOPS_HOST_PORT:-5350}:8080"
    env_file:
      - .env
    environment:
      CASEOPS_PORT: "8080"
      CASEOPS_DATA_DIR: /data
      HOME: /home/caseops
      SF_DATA_DIR: /data/.sf
      SFDX_DIR: /data/.sfdx
      CASEOPS_OUTPUTS_DIR: /data/outputs
      CASEOPS_JIRA_OUT_DIR: /data/outputs/jira
      CASEOPS_TEMP_DIR: /tmp/caseops
      CLAUDE_CODE_TMPDIR: /tmp/caseops/claude-code
      CASEOPS_ENV_FILE: /data/.env
    volumes:
      # Persistent runtime data: Jira sync output, pipeline logs, generated files,
      # Salesforce CLI state, metadata cache, and metadata workspaces.
      - ./caseops-data:/data
      # Writable env file: CaseOps Settings may update tokens in this file.
      - ./.env:/data/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
